# Build the macOS .app bundle and attach it to a GitHub Release, so non-terminal Mac users can
# download "Tintin's AI Chess Analysis.app" instead of running scripts/build_app.sh themselves.
#
# Triggers:
#   • pushing a version tag (v1.0, v1.2.3, …) — builds and publishes a Release for that tag.
#   • manual run (Actions → Build macOS app → Run workflow) — builds and uploads the artifact
#     without creating a Release (handy for testing the bundle).
name: Build macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the annotated tag object so we can read its message for the notes

      # build_app.sh only assembles the bundle (rsync + plist + launcher + optional icon via the
      # preinstalled sips/iconutil). It does NOT need uv/Python/Stockfish — those are fetched on the
      # app's first launch on the end user's machine — so there's nothing else to set up here.
      - name: Build the .app bundle
        run: ./scripts/build_app.sh

      # ditto preserves the bundle's structure/permissions in the zip (plain `zip` can mangle it).
      - name: Zip the bundle
        run: ditto -c -k --sequesterRsrc --keepParent "Tintin's AI Chess Analysis.app" "Tintins-AI-Chess-Analysis-macos.zip"

      - name: Upload as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tintins-AI-Chess-Analysis-macos
          path: Tintins-AI-Chess-Analysis-macos.zip

      # On a tag push, publish (or update) the Release and attach the zip.
      - name: Attach to the Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build the notes in a file via plain heredoc REDIRECTION (not $(...) command
          # substitution — macOS runners ship bash 3.2, which mis-parses apostrophes in a
          # heredoc-inside-command-substitution). 'EOF' quoted so $100 stays literal.
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          cat > "$NOTES_FILE" <<'EOF'
          macOS app build. Download the zip below, unzip, drag the .app into /Applications. First open (unsigned app): double-click it, then go to System Settings → Privacy & Security and click 'Open Anyway'. You only do this once. (This extra step exists only because the app isn't signed with an Apple Developer certificate — I'd rather not pay Apple's $100/year developer fee just to remove it.)
          EOF
          # Per-release "What's new" comes from the annotated tag's own message, so each tag carries
          # its notes. actions/checkout leaves a *lightweight* local tag (so %(contents) would fall
          # through to the commit message), so force-fetch the real annotated tag object first.
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" 2>/dev/null || true
          WHATS_NEW="$(git tag -l "${GITHUB_REF_NAME}" --format='%(contents:body)')"
          if [ -n "$WHATS_NEW" ]; then
            printf '\n### What'\''s new in %s\n\n%s\n' "${GITHUB_REF_NAME}" "${WHATS_NEW}" >> "$NOTES_FILE"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "$NOTES_FILE" \
            "Tintins-AI-Chess-Analysis-macos.zip" \
          || gh release upload "${GITHUB_REF_NAME}" "Tintins-AI-Chess-Analysis-macos.zip" --clobber
